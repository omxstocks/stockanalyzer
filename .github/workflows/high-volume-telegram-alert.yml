name: Run Automated Telegram Alerts

on:
  schedule:
    # Runs every hour from 7:00 to 18:00 UTC, Monday through Friday
    - cron: '30 6-22 * * 1-5'
  workflow_dispatch: 
    
  # Triggers the workflow every time you push code to the main branch
  push:
    branches:
      - main

jobs:
  send-alerts:
    runs-on: ubuntu-latest

    steps:
    # 1. Downloads a copy of your repository code onto the runner
    # Updated to v5 to resolve the Node.js 20 deprecation warning
    - name: Check out repository code
      uses: actions/checkout@v5

    # 2. Sets up a clean Python environment
    # Updated to v6 to resolve the Node.js 20 deprecation warning
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 3. Installs dependencies required by your script
    # Re-added yfinance to resolve the ModuleNotFoundError
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas yfinance

    # 4. Runs your script and securely passes your secrets into it
    - name: Run Python script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python high-volume-telegram-alert.py
